github:
  organizations:
    - tensorflow

  endpoints:
    - repositories
    - contributors
    - commits
    - pull_requests
    - issues
    - languages

  per_page: 100
  max_repositories: 20
  request_timeout: 30
  retry_count: 3

aws:
  region: us-east-1

storage:
  bronze_bucket: github-bronze
  silver_bucket: github-silver
  gold_bucket: github-gold

logging:
  level: INFO